services:
  postgres:
    image: postgres:16
    container_name: cdc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: ${KAFKA_IMAGE:-bitnamilegacy/kafka:4.0.0-debian-12-r10}
    container_name: cdc-kafka
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "19092:19092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: ${KAFKA_IMAGE:-bitnamilegacy/kafka:4.0.0-debian-12-r10}
    container_name: cdc-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -ec
      - |
        for i in {1..30}; do
          /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break
          sleep 2
        done

        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic connect-configs --partitions 1 --replication-factor 1 --config cleanup.policy=compact
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic connect-offsets --partitions 25 --replication-factor 1 --config cleanup.policy=compact
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic connect-status --partitions 5 --replication-factor 1 --config cleanup.policy=compact
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc_lab_pg.public.customers --partitions 1 --replication-factor 1
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc_lab_pg.public.orders --partitions 1 --replication-factor 1
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc_lab_pg.public.payments --partitions 1 --replication-factor 1
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cdc_lab_pg.public.transactions --partitions 1 --replication-factor 1

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: cdc-kafka-connect
    env_file:
      - ./connect/connect.env
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./connect:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  connector-init:
    image: curlimages/curl:8.7.1
    container_name: cdc-connector-init
    depends_on:
      postgres:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./connect:/config:ro
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        echo "Waiting for Kafka Connect API..."
        until curl -fsS http://kafka-connect:8083/connectors >/dev/null; do sleep 2; done
        echo "Registering Debezium connector config..."
        tmp_resp=$$(mktemp)
        http_code=$$(curl -sS -o "$$tmp_resp" -w '%{http_code}' -X PUT -H 'Content-Type: application/json' \
          --data @/config/debezium-orders-connector.json \
          http://kafka-connect:8083/connectors/orders-cdc/config)
        if [ "$$http_code" -lt 200 ] || [ "$$http_code" -ge 300 ]; then
          echo "Connector registration failed (HTTP $$http_code):"
          cat "$$tmp_resp"
          rm -f "$$tmp_resp"
          exit 1
        fi
        rm -f "$$tmp_resp"
        echo "Connector registration complete"
    restart: "no"

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: cdc-flink-jobmanager
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
        execution.checkpointing.interval: 10s
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.min-pause: 5s
        execution.checkpointing.timeout: 1min
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        state.checkpoints.dir: file:///data/flink-checkpoints
    ports:
      - "8081:8081"
    volumes:
      - ./flink/sql:/opt/flink/sql
      - ./data/iceberg:/data/iceberg
      - ./data/flink-checkpoints:/data/flink-checkpoints
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: cdc-flink-taskmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        execution.checkpointing.interval: 10s
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.min-pause: 5s
        execution.checkpointing.timeout: 1min
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        state.checkpoints.dir: file:///data/flink-checkpoints
    volumes:
      - ./flink/sql:/opt/flink/sql
      - ./data/iceberg:/data/iceberg
      - ./data/flink-checkpoints:/data/flink-checkpoints
    depends_on:
      flink-jobmanager:
        condition: service_started

  spark:
    image: bitnami/spark:3.5.1
    container_name: cdc-spark
    command: ["/bin/bash", "-lc", "sleep infinity"]
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data/iceberg:/data/iceberg
      - ./data/spark-checkpoints:/data/spark-checkpoints
      - ./output:/output

  dbt:
    build:
      context: .
      dockerfile: dbt/Dockerfile
    container_name: cdc-dbt
    volumes:
      - ./dbt:/dbt
      - ./data/iceberg:/data/iceberg
      - ./output:/output

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: cdc-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cdc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
